<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليالي العرب | للسكربتات والبرامج VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: #030305;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 🌌 خلفية الإضاءات المتحركة المدمجة 🌌 */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; background: #030305; overflow: hidden;
        }
        .glow {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4;
            animation: float 15s infinite alternate ease-in-out;
        }
        .glow-1 { width: 500px; height: 500px; background: #bf953f; top: -10%; left: -10%; }
        .glow-2 { width: 600px; height: 600px; background: #00f2fe; bottom: -20%; right: -10%; animation-delay: -5s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 80px) scale(1.1); }
        }

        /* حاوية الجسيمات */
        #particles-js { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        /* الهيدر الفخم */
        header {
            text-align: center; padding: 5rem 2rem 4rem;
            background: linear-gradient(180deg, rgba(15, 15, 20, 0.7) 0%, transparent 100%);
            border-bottom: 1px solid rgba(191, 149, 63, 0.3);
            margin-bottom: 3rem; position: relative;
        }
        header h1 {
            font-size: 4rem; font-weight: 900;
            background: linear-gradient(to left, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(191, 149, 63, 0.4); margin-bottom: 10px; letter-spacing: 2px;
        }
        header p { color: #cbd5e1; font-size: 1.3rem; text-shadow: 0 2px 4px #000; }

        /* حاوية الكروت */
        .container {
            max-width: 1250px; margin: 0 auto; padding: 0 2rem 5rem;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem;
        }

        /* تصميم الكرت الزجاجي (Glassmorphism) */
        .card {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 1.5rem;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s ease; display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s; pointer-events: none;
        }
        .card:hover::before { left: 100%; }
        .card:hover {
            transform: translateY(-10px); border-color: rgba(191, 149, 63, 0.5);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(191, 149, 63, 0.2);
        }

        .card img {
            width: 100%; height: 190px; object-fit: cover; border-radius: 12px;
            margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.05);
        }
        .card h3 { color: #fff; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .card p { color: #a1a1aa; font-size: 1rem; margin-bottom: 1.5rem; flex-grow: 1; line-height: 1.6; }

        /* الأزرار */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        .action-btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none;
        }
        
        .copy-btn { background: linear-gradient(45deg, #11998e, #38ef7d); color: #fff; box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3); }
        .copy-btn:hover { box-shadow: 0 0 20px rgba(56, 239, 125, 0.6); transform: scale(1.03); }
        
        .download-btn { background: linear-gradient(45deg, #00f2fe, #4facfe); color: #fff; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); }
        .download-btn:hover { box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); transform: scale(1.03); }

        /* أزرار الإدارة داخل الكرت */
        .admin-controls { display: flex; gap: 10px; margin-top: 10px; }
        .edit-btn { background: rgba(191, 149, 63, 0.1); color: #bf953f; border: 1px dashed #bf953f; flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold;}
        .edit-btn:hover { background: #bf953f; color: #fff; }
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px dashed #ef4444; flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold;}
        .delete-btn:hover { background: #ef4444; color: #fff; }

        /* كرت الإضافة الجديد */
        .add-new-card {
            border: 2px dashed rgba(191, 149, 63, 0.4); background: transparent;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            min-height: 380px; transition: 0.3s; color: rgba(191, 149, 63, 0.6); font-size: 1.5rem; font-weight: bold;
        }
        .add-new-card:hover { background: rgba(191, 149, 63, 0.05); color: #bf953f; border-color: #bf953f; transform: translateY(-5px); }

        /* زر الإدارة السري */
        #secret-admin-trigger {
            position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px;
            border-radius: 50%; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            z-index: 100; transition: 0.3s; border: 1px solid transparent; font-size: 1.2rem;
        }
        #secret-admin-trigger:hover { background: rgba(191, 149, 63, 0.2); color: #bf953f; border-color: #bf953f; box-shadow: 0 0 15px rgba(191, 149, 63, 0.4); }

        /* النوافذ المنبثقة (Modals) */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 15, 20, 0.95); border: 1px solid #bf953f; border-radius: 20px;
            padding: 2.5rem; z-index: 1000; width: 90%; max-width: 550px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(191, 149, 63, 0.1);
            backdrop-filter: blur(25px);
        }
        .modal h2 { color: #bf953f; margin-bottom: 1.5rem; text-align: center; font-size: 1.8rem; }
        
        .admin-input {
            width: 100%; padding: 12px 15px; margin-bottom: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid #333; color: #fff; border-radius: 10px; font-family: 'Cairo'; outline: none; transition: 0.3s;
        }
        .admin-input:focus { border-color: #bf953f; box-shadow: 0 0 10px rgba(191, 149, 63, 0.2); }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
        .primary-btn { background: linear-gradient(45deg, #bf953f, #b38728); color: #fff; padding: 12px; border: none; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; transition: 0.3s; }
        .primary-btn:hover { box-shadow: 0 0 15px rgba(191, 149, 63, 0.5); transform: translateY(-2px); }
        .danger-btn { background: #ef4444; color: #fff; padding: 12px; border: none; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; transition: 0.3s; }
        .danger-btn:hover { box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); transform: translateY(-2px); }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 999; }
        
        .discord-btn { background: #5865F2; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .discord-btn:hover { background: #4752C4; box-shadow: 0 0 15px rgba(88, 101, 242, 0.5); }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>
    <div id="particles-js"></div>

    <div id="secret-admin-trigger" onclick="openAuthModal()" title="إعدادات الموقع">
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <header>
        <h1>ليالي العرب</h1>
        <p>حياكم الله بسكربتات وبرامج ليالي العرب | مستودع النخبة</p>
    </header>

    <div class="container" id="projects-container"></div>

    <div id="overlay"></div>

    <div id="auth-modal" class="modal">
        <h2><i class="fa-brands fa-discord"></i> حماية ليالي العرب</h2>
        <p style="text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.95rem;">يجب الحصول على رمز الدخول المشفّر عبر سيرفر الديسكورد الخاص بك للتمكن من التعديل وإضافة السكربتات.</p>
        
        <button class="discord-btn" onclick="requestDiscordCode()">
            <i class="fa-solid fa-paper-plane"></i> إرسال رمز جديد للديسكورد
        </button>
        
        <input type="text" id="auth-code-input" class="admin-input" placeholder="أدخل الرمز الطويل هنا..." style="text-align: center; letter-spacing: 2px;">
        
        <div class="modal-btns">
            <button class="primary-btn" onclick="verifyCode()"><i class="fa-solid fa-unlock-keyhole"></i> تسجيل الدخول</button>
            <button class="danger-btn" onclick="closeModals()"><i class="fa-solid fa-times"></i> إلغاء</button>
        </div>
    </div>

    <div id="editor-modal" class="modal">
        <h2 id="editor-title">إضافة مشروع جديد</h2>
        <input type="text" id="edit-title" class="admin-input" placeholder="اسم المشروع (مثال: سكربت روبلوكس)">
        <textarea id="edit-desc" class="admin-input" rows="2" placeholder="وصف قصير ومميز للمشروع"></textarea>
        <input type="text" id="edit-image" class="admin-input" placeholder="رابط صورة الغلاف (URL)">
        <select id="edit-type" class="admin-input" onchange="toggleInputs()">
            <option value="script">سكربت (نص قابل للنسخ المباشر)</option>
            <option value="program">برنامج / تطبيق (رابط توجيه خارجي)</option>
        </select>
        <textarea id="edit-content" class="admin-input" rows="5" placeholder="كود السكربت أو رابط التحميل"></textarea>
        
        <div class="modal-btns">
            <button class="primary-btn" onclick="saveProject()"><i class="fa-solid fa-save"></i> حفظ ونشر</button>
            <button class="danger-btn" onclick="closeModals()"><i class="fa-solid fa-times"></i> إلغاء</button>
        </div>
    </div>

    <script>
        // 🛠️ إعدادات الجسيمات (شكل فخم وذهبي) 🛠️
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70 },
                "color": { "value": ["#bf953f", "#ffffff"] },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 130, "color": "#bf953f", "opacity": 0.3, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
                "modes": { "grab": { "distance": 150, "line_linked": { "opacity": 0.8 } } }
            },
            "retina_detect": true
        });

        // 🛠️ البيانات والروابط 🛠️
        const webhookUrl = "https://discord.com/api/webhooks/1488443327996235857/gJGoalSNljZf3m_g3PFeFFxKjcn985hN9x3nUC1JdBqJB2pFAfLbsIaL09SS1Q5iVcLX";
        let generatedSecretCode = null;
        let isAdminMode = false;
        let editingIndex = -1; // -1 يعني إضافة جديد

        const defaultProjects = [
            { title: "سكربت VIP حصري", description: "سكربت مطور خصيصاً لمتابعين ليالي العرب، أداء عالي جداً.", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600", isScript: true, content: `print("مرحباً بكم في ليالي العرب")` },
            { title: "أداة تحسين البنج", description: "برنامج لتقليل اللاق وتثبيت البنج في الألعاب الثقيلة.", image: "https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=600", isScript: false, content: "https://example.com/download" }
        ];

        let myProjects = JSON.parse(localStorage.getItem('layaliVipData')) || defaultProjects;

        // ----------------------------------------------------
        // 1. نظام الحماية بالديسكورد
        // ----------------------------------------------------
        function openAuthModal() {
            if(isAdminMode) {
                // إذا كان مسجل دخول مسبقاً، نلغي الدخول
                if(confirm("هل تريد تسجيل الخروج من وضع الإدارة؟")) {
                    isAdminMode = false;
                    renderCards();
                }
                return;
            }
            document.getElementById('auth-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('auth-code-input').value = "";
        }

        function requestDiscordCode() {
            // توليد رمز طويل ومعقد جداً
            generatedSecretCode = Array.from(crypto.getRandomValues(new Uint8Array(24)))
                .map(b => b.toString(16).padStart(2, '0')).join('');
            
            const message = {
                embeds: [{
                    title: "🚨 محاولة دخول للوحة الإدارة 🚨",
                    description: `تم طلب رمز دخول جديد لموقع ليالي العرب.\n\n🔑 **الرمز السري الخاص بك:**\n\`\`\`${generatedSecretCode}\`\`\`\n\n⚠️ *لا تشارك هذا الرمز مع أي شخص، الرمز صالح لهذه الجلسة فقط.*`,
                    color: 12555295, // لون ذهبي
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
            }).then(res => {
                if(res.ok) alert("✅ تم إرسال الرمز بنجاح إلى الديسكورد الخاص بك! يرجى التحقق من القناة.");
                else alert("❌ حدث خطأ أثناء إرسال الرمز، تأكد من رابط الويب هوك.");
            }).catch(err => {
                alert("❌ فشل الاتصال بالديسكورد.");
            });
        }

        function verifyCode() {
            const inputCode = document.getElementById('auth-code-input').value.trim();
            if(!generatedSecretCode) {
                alert("يرجى الضغط على زر إرسال الرمز أولاً!");
                return;
            }
            if(inputCode === generatedSecretCode) {
                alert("✅ تمت المصادقة بنجاح! مرحباً بك في لوحة الإدارة.");
                isAdminMode = true;
                generatedSecretCode = null; // تدمير الرمز بعد استخدامه للأمان
                closeModals();
                renderCards();
            } else {
                alert("❌ الرمز غير صحيح! حاول مرة أخرى.");
            }
        }

        // ----------------------------------------------------
        // 2. نظام عرض الكروت
        // ----------------------------------------------------
        function renderCards() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';
            
            myProjects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let buttonsHTML = project.isScript 
                    ? `<button class="action-btn copy-btn" onclick="copyScript(this, ${index})"><i class="fa-solid fa-copy"></i> نسخ السكربت</button>`
                    : `<a href="${project.content}" target="_blank" class="action-btn download-btn"><i class="fa-solid fa-download"></i> تحميل البرنامج</a>`;

                let adminHTML = isAdminMode ? `
                    <div class="admin-controls">
                        <button class="edit-btn" onclick="openEditor(${index})"><i class="fa-solid fa-pen"></i> تعديل</button>
                        <button class="delete-btn" onclick="deleteProject(${index})"><i class="fa-solid fa-trash"></i> حذف</button>
                    </div>
                ` : '';

                card.innerHTML = `
                    <img src="${project.image}" alt="صورة المشروع" onerror="this.src='https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=600'">
                    <h3>${project.title}</h3>
                    <p>${project.description}</p>
                    <div class="btn-group">
                        ${buttonsHTML}
                        ${adminHTML}
                    </div>
                `;
                container.appendChild(card);
            });

            // إذا كان المدير مفعل، أضف كرت "إضافة جديد"
            if(isAdminMode) {
                const addCard = document.createElement('div');
                addCard.className = 'card add-new-card';
                addCard.innerHTML = `<i class="fa-solid fa-plus fa-2x" style="margin-bottom:10px;"></i><br>إضافة مشروع جديد`;
                addCard.onclick = () => openEditor(-1);
                container.appendChild(addCard);
            }
        }

        // دالة النسخ
        function copyScript(btn, index) {
            navigator.clipboard.writeText(myProjects[index].content).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check"></i> تم النسخ بنجاح!`;
                setTimeout(() => btn.innerHTML = originalHtml, 2000);
            });
        }

        // ----------------------------------------------------
        // 3. نظام الإضافة والتعديل والحذف
        // ----------------------------------------------------
        function openEditor(index) {
            editingIndex = index;
            document.getElementById('editor-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';

            if(index === -1) {
                // وضع الإضافة
                document.getElementById('editor-title').innerText = "إضافة مشروع جديد";
                document.getElementById('edit-title').value = "";
                document.getElementById('edit-desc').value = "";
                document.getElementById('edit-image').value = "";
                document.getElementById('edit-type').value = "script";
                document.getElementById('edit-content').value = "";
            } else {
                // وضع التعديل
                const p = myProjects[index];
                document.getElementById('editor-title').innerText = "تعديل المشروع";
                document.getElementById('edit-title').value = p.title;
                document.getElementById('edit-desc').value = p.description;
                document.getElementById('edit-image').value = p.image;
                document.getElementById('edit-type').value = p.isScript ? "script" : "program";
                document.getElementById('edit-content').value = p.content;
            }
            toggleInputs();
        }

        function saveProject() {
            const newProject = {
                title: document.getElementById('edit-title').value || "بدون اسم",
                description: document.getElementById('edit-desc').value || "بدون وصف",
                image: document.getElementById('edit-image').value || "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600",
                isScript: document.getElementById('edit-type').value === 'script',
                content: document.getElementById('edit-content').value
            };

            if(editingIndex === -1) {
                myProjects.push(newProject); // إضافة جديد
            } else {
                myProjects[editingIndex] = newProject; // تحديث الحالي
            }

            saveData();
            closeModals();
            renderCards();
        }

        function deleteProject(index) {
            if(confirm("هل أنت متأكد من حذف هذا المشروع نهائياً؟")) {
                myProjects.splice(index, 1);
                saveData();
                renderCards();
            }
        }

        function toggleInputs() {
            const type = document.getElementById('edit-type').value;
            document.getElementById('edit-content').placeholder = type === 'script' ? "ضع كود السكربت كاملاً هنا..." : "ضع رابط تحميل البرنامج هنا (مثال: https://...)";
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('overlay').style.display = 'none';
        }

        function saveData() {
            localStorage.setItem('layaliVipData', JSON.stringify(myProjects));
        }

        // تشغيل البداية
        document.addEventListener('DOMContentLoaded', renderCards);
    </script>
</body>
</html>
