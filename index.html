<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزانة المنتجات | إدارة مخزون الساعات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: #050508; color: #fff; min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at 50% 0%, #1a150b 0%, #050508 80%);
        }

        .dashboard-container {
            display: flex; gap: 2rem; width: 100%; max-width: 1400px;
            margin: 0 auto; flex-wrap: wrap; align-items: flex-start;
        }

        /* اللوحات الجانبية */
        .admin-panel, .preview-panel {
            background: rgba(15, 15, 20, 0.7); border: 1px solid #bf953f;
            border-radius: 20px; padding: 2rem; flex: 1; min-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 30px rgba(191, 149, 63, 0.15);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        .header { text-align: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(191, 149, 63, 0.2); padding-bottom: 1rem; }
        .header h1 { color: #bf953f; font-size: 2.2rem; text-shadow: 0 0 20px rgba(191, 149, 63, 0.4); margin-bottom: 5px; font-weight: 900; }
        .header p { color: #a1a1aa; font-size: 1rem; }

        .section-title { color: #bf953f; font-size: 1.1rem; border-bottom: 1px dashed #bf953f; padding-bottom: 5px; margin-bottom: 15px; margin-top: 20px; font-weight: bold;}

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; color: #e2e8f0; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        
        .admin-input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.6);
            border: 1px solid #333; color: #fff; border-radius: 10px;
            font-family: 'Cairo'; outline: none; transition: 0.3s; font-size: 0.95rem;
        }
        .admin-input:focus { border-color: #bf953f; box-shadow: 0 0 15px rgba(191, 149, 63, 0.3); background: rgba(0,0,0,0.8); }

        .file-upload-wrapper { position: relative; width: 100%; height: 45px; }
        .file-upload-input { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .file-upload-btn {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(191, 149, 63, 0.1); border: 2px dashed #bf953f;
            color: #bf953f; border-radius: 10px; display: flex; justify-content: center; align-items: center;
            font-weight: bold; transition: 0.3s; z-index: 1; gap: 10px;
        }
        .file-upload-wrapper:hover .file-upload-btn { background: rgba(191, 149, 63, 0.2); }
        .file-name-display { display: block; margin-top: 5px; font-size: 0.8rem; color: #38ef7d; text-align: center; }

        .send-btn {
            background: linear-gradient(45deg, #bf953f, #b38728); color: #fff;
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 1rem;
        }
        .send-btn:hover { box-shadow: 0 0 25px rgba(191, 149, 63, 0.5); transform: translateY(-3px); }

        /* كروت المنتجات المنتجة */
        .products-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-top: 1rem; }
        .product-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(191, 149, 63, 0.2);
            border-radius: 15px; padding: 1rem; display: flex; gap: 15px; align-items: center;
            position: relative; transition: 0.3s;
        }
        .product-card:hover { border-color: #bf953f; background: rgba(255, 255, 255, 0.05); }
        .product-img { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; border: 1px solid #333; }
        .product-info { flex: 1; }
        .product-title { color: #bf953f; font-weight: bold; font-size: 1.2rem; }
        .product-desc { color: #a1a1aa; font-size: 0.85rem; margin-bottom: 5px; }
        
        /* شارات التوفر */
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .status-instock { background: rgba(56, 239, 125, 0.2); color: #38ef7d; }
        .status-outofstock { background: rgba(239, 83, 80, 0.2); color: #ef5350; }

        /* التحكم بالكمية والبيع */
        .qty-controls { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .qty-btn { background: #1a150b; border: 1px solid #bf953f; color: #bf953f; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .qty-btn:hover { background: #bf953f; color: #000; }
        .qty-val { font-weight: bold; font-size: 1rem; min-width: 20px; text-align: center; }

        .sell-btn { background: #bf953f; color: #050508; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; margin-right: auto; transition: 0.2s;}
        .sell-btn:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .delete-product-btn { position: absolute; top: 10px; left: 10px; color: #ef5350; cursor: pointer; background: transparent; border: none; font-size: 0.9rem; }

        /* جدول الطلبات */
        .orders-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .orders-table th, .orders-table td { padding: 10px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .orders-table th { color: #bf953f; font-weight: bold; }
        .orders-table tr:hover { background: rgba(191, 149, 63, 0.03); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="admin-panel">
            <div class="header">
                <h1><i class="fa-solid fa-box-archive"></i> خزانة المنتجات</h1>
                <p>إدارة مخزون الساعات والمبيعات الذكية</p>
            </div>

            <div class="section-title"><i class="fa-solid fa-plus"></i> إضافة عنصر جديد للمخزن</div>
            
            <div class="form-group">
                <label>اسم الساعة / المنتج:</label>
                <input type="text" id="prod-title" class="admin-input" placeholder="مثال: ساعة رولكس كلاسيك ذهبية">
            </div>

            <div class="form-group">
                <label>الوصف والمواصفات:</label>
                <textarea id="prod-desc" class="admin-input" rows="2" placeholder="اكتب وصفاً مختصراً هنا..."></textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>الكمية المتوفرة حالياً:</label>
                    <input type="number" id="prod-qty" class="admin-input" value="5" min="0">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>صورة الساعة:</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="prod-img-file" class="file-upload-input" accept="image/*" onchange="handleFileLabel()">
                        <div class="file-upload-btn">
                            <i class="fa-solid fa-image"></i> اختر صورة
                        </div>
                    </div>
                    <span id="file-name" class="file-name-display">لم يتم تحديد صورة</span>
                </div>
            </div>

            <button class="send-btn" onclick="addNewProduct()">
                <i class="fa-solid fa-square-plus"></i> إضافة الساعة إلى الخزانة
            </button>
        </div>

        <div class="preview-panel">
            <div class="section-title" style="margin-top: 0;"><i class="fa-solid fa-layer-group"></i> غرف العرض والمخزون الحالي</div>
            
            <div class="products-grid" id="products-list">
                </div>

            <div class="section-title" style="margin-top: 30px;"><i class="fa-solid fa-receipt"></i> قائمة الطلبات والمبيعات المُحولة</div>
            
            <div style="overflow-x: auto; max-height: 250px;">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>المشتري</th>
                            <th>المنتج</th>
                            <th>سعر البيع</th>
                            <th>التوقيت</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // مصفوفات حفظ البيانات محلياً
        let products = JSON.parse(localStorage.getItem('my_inventory_products')) || [];
        let orders = JSON.parse(localStorage.getItem('my_inventory_orders')) || [];

        // لتحديث اسم الملف المرفوع في الواجهة
        function handleFileLabel() {
            const input = document.getElementById('prod-img-file');
            const display = document.getElementById('file-name');
            if(input.files && input.files[0]) {
                display.innerHTML = `<i class="fa-solid fa-check"></i> ${input.files[0].name}`;
            } else {
                display.innerText = "لم يتم تحديد صورة";
            }
        }

        // إضافة منتج جديد
        function addNewProduct() {
            const title = document.getElementById('prod-title').value.trim();
            const desc = document.getElementById('prod-desc').value.trim();
            const qty = parseInt(document.getElementById('prod-qty').value) || 0;
            const imgInput = document.getElementById('prod-img-file');

            if(!title || !desc) {
                alert("⚠️ يرجى ملء اسم الساعة والوصف أولاً!");
                return;
            }

            let imgUrl = "https://cdn-icons-png.flaticon.com/512/3592/3592869.png"; // صورة افتراضية

            if(imgInput.files && imgInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgUrl = e.target.result;
                    saveProductToArray(title, desc, qty, imgUrl);
                }
                reader.readAsDataURL(imgInput.files[0]);
            } else {
                saveProductToArray(title, desc, qty, imgUrl);
            }
        }

        function saveProductToArray(title, desc, qty, imgUrl) {
            const newProduct = {
                id: Date.now(),
                title: title,
                desc: desc,
                qty: qty,
                image: imgUrl
            };

            products.push(newProduct);
            updateLocalStorage();
            renderDashboard();

            // تنظيف المدخلات بعد الإضافة نجاح
            document.getElementById('prod-title').value = '';
            document.getElementById('prod-desc').value = '';
            document.getElementById('prod-qty').value = '5';
            document.getElementById('prod-img-file').value = '';
            document.getElementById('file-name').innerText = "لم يتم تحديد صورة";
        }

        // التحكم بالكمية (+ و -) زري الإضافة السريعة
        function changeQty(id, amount) {
            const prod = products.find(p => p.id === id);
            if(prod) {
                prod.qty = Math.max(0, prod.qty + amount);
                updateLocalStorage();
                renderDashboard();
            }
        }

        // تحويل الساعة إلى قائمة الطلبات (بيع قطعة واحدة)
        function sellOneUnit(id) {
            const prod = products.find(p => p.id === id);
            if(!prod) return;

            if(prod.qty <= 0) {
                alert("⚠️ هذا المنتج نفذ من المخزن! أضف كمية أولاً لتتمكن من البيع.");
                return;
            }

            const buyerName = prompt("أدخل اسم المشتري المحترم:");
            if(!buyerName) return; // تم الإلغاء

            const sellPrice = prompt("أدخل السعر المتفق عليه للبيع:", "0$");
            if(!sellPrice) return; // تم الإلغاء

            // خصم قطعة واحدة تلقائياً من الخزانة
            prod.qty -= 1;

            // إضافة الفاتورة لجدول المبيعات والطلبات
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            const newOrder = {
                buyer: buyerName,
                productTitle: prod.title,
                price: sellPrice,
                time: timeStr
            };

            orders.unshift(newOrder); // إضافة لقمة الجدول
            updateLocalStorage();
            renderDashboard();
        }

        // حذف منتج بالكامل
        function deleteProduct(id) {
            if(confirm("هل أنت متأكد من حذف هذا المنتج نهائياً من خزانتك؟")) {
                products = products.filter(p => p.id !== id);
                updateLocalStorage();
                renderDashboard();
            }
        }

        // حفظ البيانات في جهازك الحالي
        function updateLocalStorage() {
            localStorage.setItem('my_inventory_products', JSON.stringify(products));
            localStorage.setItem('my_inventory_orders', JSON.stringify(orders));
        }

        // بناء وعرض القوائم مجدداً في الصفحة
        function renderDashboard() {
            const productsList = document.getElementById('products-list');
            const ordersList = document.getElementById('orders-list');

            // 1. عرض المنتجات في المخزن
            productsList.innerHTML = '';
            if(products.length === 0) {
                productsList.innerHTML = `<p style="color: #a1a1aa; font-size: 0.9rem; text-align: center; padding: 2rem;">الخزانة فارغة حالياً.. أضف ساعاتك لتبدأ المتابعة!</p>`;
            }

            products.forEach(prod => {
                const isAvailable = prod.qty > 0;
                const badgeClass = isAvailable ? 'status-instock' : 'status-outofstock';
                const badgeText = isAvailable ? `متوفر (${prod.qty} قطعة) ✅` : 'غير متوفر ❌';

                productsList.innerHTML += `
                    <div class="product-card">
                        <button class="delete-product-btn" onclick="deleteProduct(${prod.id})"><i class="fa-solid fa-trash"></i></button>
                        <img src="${prod.image}" class="product-img" alt="product">
                        <div class="product-info">
                            <div class="product-title">${prod.title}</div>
                            <div class="product-desc">${prod.desc}</div>
                            <span class="status-badge ${badgeClass}">${badgeText}</span>
                            
                            <div class="qty-controls">
                                <span style="font-size: 0.8rem; color: #a1a1aa;">تعديل الكمية:</span>
                                <button class="qty-btn" onclick="changeQty(${prod.id}, 1)">+</button>
                                <span class="qty-val">${prod.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${prod.id}, -1)">-</button>
                            </div>
                        </div>
                        <button class="sell-btn" onclick="sellOneUnit(${prod.id})">
                            <i class="fa-solid fa-cart-shopping"></i> بيع واحدة
                        </button>
                    </div>
                `;
            });

            // 2. عرض جدول المبيعات المحولة
            ordersList.innerHTML = '';
            if(orders.length === 0) {
                ordersList.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #a1a1aa;">لا توجد طلبات محولة بعد.</td></tr>`;
            }

            orders.forEach(order => {
                ordersList.innerHTML += `
                    <tr>
                        <td style="color: #fff; font-weight: bold;">${order.buyer}</td>
                        <td style="color: #bf953f;">${order.productTitle}</td>
                        <td style="color: #38ef7d; font-weight: bold;">${order.price}</td>
                        <td style="color: #949ba4;">${order.time}</td>
                    </tr>
                `;
            });
        }

        // تشغيل البناء الأولي عند فتح الصفحة لقراءة الكاش المحفوظ بجهازك
        renderDashboard();
    </script>
</body>
</html>
