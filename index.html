<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليالي العرب | للسكربتات والبرامج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: #05050a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 🌌 خلفية الإضاءات المتحركة (بدون مكاتب خارجية لضمان عملها دائماً) 🌌 */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: #05050a;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 12s infinite alternate ease-in-out;
        }

        .glow-1 { width: 400px; height: 400px; background: #4facfe; top: -10%; left: -10%; }
        .glow-2 { width: 500px; height: 500px; background: #00f2fe; bottom: -20%; right: -10%; animation-delay: -4s; }
        .glow-3 { width: 300px; height: 300px; background: #11998e; top: 40%; left: 50%; animation-delay: -8s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* الهيدر */
        header {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to left, #00f2fe, #4facfe, #38ef7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            margin-bottom: 10px;
        }

        header p { color: #a0aec0; font-size: 1.2rem; }

        /* حاوية الكروت */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* تصميم الكرت - زجاجي عصري */
        .card {
            background: rgba(25, 25, 35, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 242, 254, 0.2);
            background: rgba(35, 35, 45, 0.6);
        }

        .card img {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 12px; margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card h3 { color: #fff; font-size: 1.4rem; margin-bottom: 0.5rem; }
        .card p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 1.5rem; flex-grow: 1; line-height: 1.6; }

        /* الأزرار */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        
        .action-btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: 0.3s; text-decoration: none; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .copy-btn {
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            border: 1px solid #00f2fe;
        }
        .copy-btn:hover { background: #00f2fe; color: #000; box-shadow: 0 0 15px #00f2fe; }

        .download-btn {
            background: rgba(56, 239, 125, 0.1);
            color: #38ef7d;
            border: 1px solid #38ef7d;
        }
        .download-btn:hover { background: #38ef7d; color: #000; box-shadow: 0 0 15px #38ef7d; }

        .admin-edit-btn {
            background: transparent; color: #ffbc00; border: 1px dashed #ffbc00; margin-top: 5px;
        }
        .admin-edit-btn:hover { background: rgba(255, 188, 0, 0.1); }

        /* زر الإدارة السري */
        #secret-admin-trigger {
            position: fixed; bottom: 20px; left: 20px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100; transition: 0.3s;
        }
        #secret-admin-trigger:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* لوحة التحكم */
        #admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111827; border: 1px solid #374151; border-radius: 20px;
            padding: 2rem; z-index: 1000; width: 90%; max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        #admin-panel h2 { color: #fff; margin-bottom: 1.5rem; text-align: center; font-size: 1.5rem; }
        .admin-input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #1f2937;
            border: 1px solid #4b5563; color: #fff; border-radius: 10px; font-family: 'Cairo'; outline: none;
        }
        .admin-input:focus { border-color: #00f2fe; }
        .admin-btns { display: flex; gap: 10px; }
        .save-btn { background: #10b981; color: #fff; padding: 12px; border: none; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; }
        .close-btn { background: #ef4444; color: #fff; padding: 12px; border: none; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 999; }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <div id="secret-admin-trigger" onclick="toggleAdminMode()" title="دخول الإدارة">
        <i class="fa-solid fa-gear"></i>
    </div>

    <header>
        <h1>ليالي العرب</h1>
        <p>حياكم الله بسكربتات وبرامج ليالي العرب | الجودة والاحترافية</p>
    </header>

    <div class="container" id="projects-container"></div>

    <div id="overlay"></div>
    <div id="admin-panel">
        <h2>تعديل المشروع</h2>
        <input type="text" id="edit-title" class="admin-input" placeholder="اسم المشروع">
        <textarea id="edit-desc" class="admin-input" rows="3" placeholder="وصف المشروع (مثال: سكربت احترافي...)"></textarea>
        <input type="text" id="edit-image" class="admin-input" placeholder="رابط الصورة (URL)">
        <select id="edit-type" class="admin-input" onchange="toggleInputs()">
            <option value="script">سكربت (زر للنسخ المباشر)</option>
            <option value="program">برنامج (رابط توجيه للتحميل)</option>
        </select>
        <textarea id="edit-content" class="admin-input" rows="4" placeholder="كود السكربت أو رابط التحميل"></textarea>
        
        <div class="admin-btns">
            <button class="save-btn" onclick="saveEdits()"><i class="fa-solid fa-save"></i> حفظ التعديلات</button>
            <button class="close-btn" onclick="closeAdmin()"><i class="fa-solid fa-times"></i> إلغاء</button>
        </div>
    </div>

    <script>
        // المشاريع الافتراضية
        const defaultProjects = [
            { title: "سكربت الطيران الأسطوري", description: "سكربت طيران حصري مع واجهة تحكم، آمن من الباند.", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500", isScript: true, content: `print("حياكم الله في ليالي العرب")\n-- كود السكربت يوضع هنا` },
            { title: "أداة تنظيف الويندوز", description: "برنامج خفيف لتسريع حاسوبك وحذف الملفات المؤقتة بنقرة.", image: "https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=500", isScript: false, content: "https://example.com/download" },
            { title: "سكربت الأيمبوت المدفوع", description: "تتبع تلقائي عالي الدقة، مخصص للمحترفين.", image: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500", isScript: true, content: `-- Aimbot V3\nlocal aim = true;` }
        ];

        let myProjects = [];
        let isAdminMode = false;
        let currentEditingIndex = null;

        // محاولة جلب البيانات المحفوظة، وإذا فشلت نستخدم الافتراضية
        try {
            myProjects = JSON.parse(localStorage.getItem('layaliDataNew')) || defaultProjects;
        } catch (e) {
            myProjects = defaultProjects;
        }

        // دالة عرض الكروت
        function renderCards() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';
            
            myProjects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // تحديد شكل الزر حسب نوع المشروع
                let buttonsHTML = project.isScript 
                    ? `<button class="action-btn copy-btn" onclick="copyScript(this, ${index})"><i class="fa-solid fa-copy"></i> نسخ السكربت</button>`
                    : `<a href="${project.content}" target="_blank" class="action-btn download-btn"><i class="fa-solid fa-download"></i> تحميل البرنامج</a>`;

                // زر التعديل يظهر فقط إذا كنت في وضع الإدارة
                const adminBtn = `<button class="action-btn admin-edit-btn" onclick="openAdmin(${index})"><i class="fa-solid fa-pen"></i> تعديل</button>`;

                card.innerHTML = `
                    <img src="${project.image}" alt="صورة المشروع">
                    <h3>${project.title}</h3>
                    <p>${project.description}</p>
                    <div class="btn-group">
                        ${buttonsHTML}
                        ${isAdminMode ? adminBtn : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // دالة نسخ السكربت
        function copyScript(btn, index) {
            const code = myProjects[index].content;
            navigator.clipboard.writeText(code).then(() => {
                const originalText = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check"></i> تم النسخ!`;
                btn.style.background = "#00f2fe";
                btn.style.color = "#000";
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = "rgba(0, 242, 254, 0.1)";
                    btn.style.color = "#00f2fe";
                }, 2000);
            });
        }

        // ------------------------------------
        // نظام إدارة المحتوى (المحفوظ محلياً)
        // ------------------------------------
        function toggleAdminMode() {
            if (!isAdminMode) {
                const password = prompt("أدخل الرقم السري لفتح الإدارة (الرمز: 1234):");
                if (password === "1234") {
                    isAdminMode = true;
                    alert("تم تفعيل وضع التعديل! ستظهر الآن أزرار التعديل أسفل كل كرت.");
                    renderCards();
                } else if (password !== null) {
                    alert("الرمز السري خاطئ.");
                }
            } else {
                isAdminMode = false;
                alert("تم إغلاق وضع التعديل.");
                renderCards();
            }
        }

        function openAdmin(index) {
            currentEditingIndex = index;
            const proj = myProjects[index];
            document.getElementById('edit-title').value = proj.title;
            document.getElementById('edit-desc').value = proj.description;
            document.getElementById('edit-image').value = proj.image;
            document.getElementById('edit-type').value = proj.isScript ? 'script' : 'program';
            document.getElementById('edit-content').value = proj.content;
            
            toggleInputs(); // تحديث النص الإرشادي
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            currentEditingIndex = null;
        }

        function saveEdits() {
            if(currentEditingIndex !== null) {
                myProjects[currentEditingIndex] = {
                    title: document.getElementById('edit-title').value,
                    description: document.getElementById('edit-desc').value,
                    image: document.getElementById('edit-image').value,
                    isScript: document.getElementById('edit-type').value === 'script',
                    content: document.getElementById('edit-content').value
                };
                
                // حفظ البيانات في المتصفح الخاص بك
                localStorage.setItem('layaliDataNew', JSON.stringify(myProjects));
                closeAdmin();
                renderCards();
            }
        }

        function toggleInputs() {
            const type = document.getElementById('edit-type').value;
            const contentBox = document.getElementById('edit-content');
            contentBox.placeholder = type === 'script' ? "ضع كود السكربت هنا بالكامل..." : "ضع رابط توجيه التحميل هنا (مثال: https://...)...";
        }

        // تشغيل الموقع لأول مرة
        document.addEventListener('DOMContentLoaded', renderCards);
    </script>
</body>
</html>
