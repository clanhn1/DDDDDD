<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة حسن | للسكربتات والبرامج</title>
    <style>
        /* إعدادات عامة والخطوط */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #050505; /* لون خلفية داكن تحسباً لتأخر تحميل الفيديو */
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 🎬 حاوية فيديو اليوتيوب في الخلفية 🎬 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* ليكون في الخلفية دائماً */
            overflow: hidden;
            pointer-events: none; /* لمنع المستخدم من التفاعل مع الفيديو (ايقاف/تشغيل) */
        }

        .video-background iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* نسبة أبعاد 16:9 لفيديوهات اليوتيوب */
            min-height: 100vh;
            min-width: 177.77vh; /* لضمان تغطية الشاشة بالكامل */
            transform: translate(-50%, -50%);
            opacity: 0.15; /* يمكنك تعديل هذا الرقم لزيادة أو تقليل شفافية الفيديو (مثلاً 0.3 أغمق) */
            filter: contrast(1.2) brightness(0.8); /* تحسين لون الفيديو ليلائم الستايل الزجاجي */
        }

        /* -------------------------------------- */

        /* الهيدر فخم وزجاجي (Glassmorphism) */
        header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.05); /* شفافية أقوى ليبرز الفيديو في الخلف */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); /* إضافة ظل لزيادة العمق */
        }

        header h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to left, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.5); /* توهج للنص */
        }

        header p {
            font-size: 1.2rem;
            color: #e2e8f0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* تحديد النص لتسهيل قراءته فوق الفيديو */
        }

        /* حاوية الكروت */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* تصميم الكرت (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); /* تأثير زجاجي 3D */
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(79, 172, 254, 0.8);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 20px rgba(79, 172, 254, 0.4);
            background: rgba(255, 255, 255, 0.08); /* إضاءة خفيفة عند التأشير */
        }

        /* صورة المشروع */
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            transition: transform 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* نصوص الكرت */
        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #f8fafc;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .card p {
            color: #cbd5e1;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* زر التحميل/النسخ */
        .download-btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            text-align: center;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            border-radius: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .download-btn:hover {
            box-shadow: 0 0 20px #00f2fe;
            color: #fff;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }

        /* تأثيرات الحركة (Animations) */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe 
            src="https://www.youtube.com/embed/b_K1NLOUoqI?autoplay=1&mute=1&loop=1&playlist=b_K1NLOUoqI&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3" 
            frameborder="0" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

    <header>
        <h1>مستودع السكربتات والبرامج</h1>
        <p>مكتبة مخصصة لنشر أحدث وأقوى أدوات التطوير حصرياً</p>
    </header>

    <div class="container" id="projects-container">
        </div>

    <script>
        // 🛠️ منطقة التحكم 🛠️
        const myProjects = [
            {
                title: "سكربت روبلوكس المتطور",
                description: "سكربت احترافي يدعم واجهات المستخدم التفاعلية (GUI) بدون التأثير على الأداء.",
                image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                link: "https://github.com/YourUsername/RepoName/releases/download/v1.0/script.lua"
            },
            {
                title: "برنامج تحسين النظام",
                description: "أداة صيانة قوية للويندوز وتخفيف استهلاك موارد الجهاز.",
                image: "https://images.unsplash.com/photo-1629654297299-c8506221ca97?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                link: "https://link-to-your-program.com/download"
            },
            {
                title: "نظام الشخصية الذكية (Mimic)",
                description: "نظام تتبع ذكي للمجسمات في ألعاب روبلوكس مع تفاعلات واقعية.",
                image: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                link: "https://pastebin.com/your-script-link"
            }
        ];

        const container = document.getElementById('projects-container');

        myProjects.forEach((project, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${index * 0.15}s`;
            
            card.innerHTML = `
                <img src="${project.image}" alt="${project.title}">
                <h3>${project.title}</h3>
                <p>${project.description}</p>
                <a href="${project.link}" target="_blank" class="download-btn">تحميل / عرض</a>
            `;
            
            container.appendChild(card);
        });
    </script>

</body>
</html>
