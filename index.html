<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليالي العرب | لوحة النشر للديسكورد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: #0d0d12; color: #fff; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 2rem;
            background-image: radial-gradient(circle at 50% 0%, #2a2010 0%, #0d0d12 70%);
        }

        .admin-panel {
            background: rgba(20, 20, 25, 0.8); border: 1px solid #bf953f;
            border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(191, 149, 63, 0.15);
            backdrop-filter: blur(20px);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: #bf953f; font-size: 2.5rem; text-shadow: 0 0 20px rgba(191, 149, 63, 0.4); margin-bottom: 5px; }
        .header p { color: #a1a1aa; font-size: 1.1rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: #bf953f; margin-bottom: 8px; font-weight: bold; }
        
        .admin-input {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.5);
            border: 1px solid #333; color: #fff; border-radius: 12px;
            font-family: 'Cairo'; outline: none; transition: 0.3s; font-size: 1rem;
        }
        .admin-input:focus { border-color: #bf953f; box-shadow: 0 0 15px rgba(191, 149, 63, 0.3); }

        .send-btn {
            background: linear-gradient(45deg, #bf953f, #b38728); color: #fff;
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            margin-top: 1rem;
        }
        .send-btn:hover { box-shadow: 0 0 25px rgba(191, 149, 63, 0.6); transform: translateY(-3px); }

        /* معاينة شكل الرسالة */
        .preview-box {
            margin-top: 2rem; padding: 1rem; background: #2b2d31; border-left: 4px solid #bf953f;
            border-radius: 4px; display: none;
        }
        .preview-box h3 { color: #fff; font-size: 1.1rem; margin-bottom: 10px; }
        .preview-box p { color: #dbdee1; font-size: 0.9rem; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <div class="header">
            <h1><i class="fa-brands fa-discord"></i> الإدارة العليا</h1>
            <p>لوحة نشر السكربتات والبرامج في ديسكورد ليالي العرب</p>
        </div>

        <div class="form-group">
            <label>اسم المشروع (عنوان الرسالة):</label>
            <input type="text" id="msg-title" class="admin-input" placeholder="مثال: سكربت طيران VIP">
        </div>

        <div class="form-group">
            <label>وصف المشروع والمميزات:</label>
            <textarea id="msg-desc" class="admin-input" rows="3" placeholder="اكتب المميزات هنا..."></textarea>
        </div>

        <div class="form-group">
            <label>نوع المنشور:</label>
            <select id="msg-type" class="admin-input" onchange="toggleInputType()">
                <option value="script">سكربت (نص برمجي للنسخ)</option>
                <option value="program">برنامج (رابط تحميل خارجي)</option>
            </select>
        </div>

        <div class="form-group">
            <label id="content-label">كود السكربت:</label>
            <textarea id="msg-content" class="admin-input" rows="4" placeholder="ضع الكود هنا..."></textarea>
        </div>

        <div class="form-group">
            <label>رابط صورة الغلاف (اختياري لتزيين الرسالة):</label>
            <input type="text" id="msg-image" class="admin-input" placeholder="https://...">
        </div>

        <div class="form-group">
            <label>منشن (اختياري):</label>
            <select id="msg-mention" class="admin-input">
                <option value="">بدون منشن</option>
                <option value="@everyone">منشن للجميع (@everyone)</option>
                <option value="@here">منشن للمتواجدين (@here)</option>
            </select>
        </div>

        <button class="send-btn" onclick="sendToDiscord()">
            <i class="fa-solid fa-paper-plane"></i> نشر الرسالة في السيرفر
        </button>
    </div>

    <script>
        // رابط الويب هوك الخاص بك (الروم الذي تريد النشر فيه)
        const webhookUrl = "https://discord.com/api/webhooks/1488443327996235857/gJGoalSNljZf3m_g3PFeFFxKjcn985hN9x3nUC1JdBqJB2pFAfLbsIaL09SS1Q5iVcLX";

        function toggleInputType() {
            const type = document.getElementById('msg-type').value;
            const label = document.getElementById('content-label');
            const content = document.getElementById('msg-content');
            
            if (type === 'script') {
                label.innerText = "كود السكربت:";
                content.placeholder = "ضع الكود هنا ليظهر بشكل صندوق برمجي فخم في الديسكورد...";
            } else {
                label.innerText = "رابط التحميل:";
                content.placeholder = "ضع رابط التحميل المباشر هنا...";
            }
        }

        function sendToDiscord() {
            const title = document.getElementById('msg-title').value.trim();
            const desc = document.getElementById('msg-desc').value.trim();
            const type = document.getElementById('msg-type').value;
            const content = document.getElementById('msg-content').value.trim();
            const image = document.getElementById('msg-image').value.trim();
            const mention = document.getElementById('msg-mention').value;

            if (!title || !content) {
                alert("يرجى ملء اسم المشروع والمحتوى على الأقل!");
                return;
            }

            // تجهيز طريقة عرض المحتوى داخل الديسكورد
            let discordDescription = `**${desc}**\n\n`;
            
            if (type === 'script') {
                // وضع الكود داخل صندوق برمجي (Markdown) لسهولة النسخ
                discordDescription += `\`\`\`lua\n${content}\n\`\`\``;
            } else {
                // وضع رابط التحميل كزر نصي فخم
                discordDescription += `🔗 **[اضغط هنا لتحميل البرنامج](${content})**`;
            }

            // بناء هيكل رسالة الديسكورد (Embed)
            const payload = {
                content: mention, // المنشن إذا تم اختياره
                username: "ليالي العرب | الإدارة", // اسم البوت المرسل
                avatar_url: "https://i.imgur.com/your_logo_here.png", // يمكنك وضع رابط لوجو موقعك هنا
                embeds: [
                    {
                        title: `👑 | ${title}`,
                        description: discordDescription,
                        color: 12555295, // اللون الذهبي VIP الخاص بك
                        thumbnail: image ? { url: image } : null,
                        footer: {
                            text: "ليالي العرب VIP • تم النشر بواسطة الإدارة العليا"
                        },
                        timestamp: new Date().toISOString()
                    }
                ]
            };

            // إرسال الطلب للديسكورد
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => {
                if (res.ok) {
                    alert("✅ تم إرسال الرسالة الإدارية الفخمة بنجاح إلى سيرفرك!");
                    // تنظيف الحقول بعد الإرسال
                    document.getElementById('msg-title').value = '';
                    document.getElementById('msg-desc').value = '';
                    document.getElementById('msg-content').value = '';
                } else {
                    alert("❌ حدث خطأ أثناء الإرسال! تأكد من رابط الويب هوك.");
                }
            }).catch(err => {
                alert("❌ فشل الاتصال بالإنترنت.");
            });
        }
    </script>
</body>
</html>
